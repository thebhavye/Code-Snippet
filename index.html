<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnippetVault</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="landing">
  <div class="landing-content">
    <h1 class="landing-headline">
      Save, search & reuse your <span>best code</span>
    </h1>
    <button onclick="enterApp()">Open My Vault</button>
  </div>
</div>

<div id="app">

  <aside class="sidebar">
    <h2>SnippetVault</h2>
    <button onclick="showForm()">+ New Snippet</button>
  </aside>

  <main id="main">
    <h2>Welcome</h2>
    <p>No snippets yet</p>
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
